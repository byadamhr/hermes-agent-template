<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Synapse Monitor — Full Screen</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0e1a; overflow: hidden; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  #wrap { display: flex; height: 100vh; }
  #files { width: 220px; background: rgba(14,18,28,0.95); border-right: 1px solid rgba(100,255,218,0.06); overflow-y: auto; padding: 8px; flex-shrink: 0; }
  #files::-webkit-scrollbar { width: 4px; }
  #files::-webkit-scrollbar-thumb { background: rgba(100,255,218,0.15); border-radius: 2px; }
  .ft { font-size: 11px; color: #5a6580; letter-spacing: 1.5px; text-transform: uppercase; padding: 4px 6px 6px; }
  .fc { border: 1px solid rgba(100,255,218,0.1); border-radius: 6px; padding: 8px 10px; background: rgba(20,24,31,0.5); margin-bottom: 6px; }
  .fc.processing { border-color: rgba(255,179,71,0.3); }
  .fc.complete { border-color: rgba(69,183,100,0.3); }
  .fh { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .fn { font-size: 12px; color: #ccd6f6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
  .fs { font-size: 10px; padding: 1px 6px; border-radius: 8px; font-weight: 600; }
  .fs.processing { background: rgba(255,179,71,0.15); color: #ffb347; }
  .fs.queued { background: rgba(107,118,136,0.15); color: #6b7688; }
  .fs.complete { background: rgba(69,183,100,0.15); color: #45b764; }
  .pt { width: 100%; height: 6px; background: rgba(100,255,218,0.06); border: 1px solid rgba(100,255,218,0.08); border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
  .pf { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
  .pf.processing { background: linear-gradient(90deg, #ffb347, #ffc875); box-shadow: 0 0 6px rgba(255,179,71,0.4); }
  .pf.complete { background: linear-gradient(90deg, #45b764, #5dd87a); box-shadow: 0 0 6px rgba(69,183,100,0.4); }
  .ff { display: flex; justify-content: space-between; font-size: 10px; color: #5a6580; }
  .eta { color: #8892b0; font-variant-numeric: tabular-nums; }
  .pct { color: #64ffda; font-weight: 600; font-variant-numeric: tabular-nums; }
  #canvas-wrap { flex: 1; position: relative; }
  canvas { display: block; }
  #hud { position: fixed; top: 12px; left: 240px; color: #8892b0; font-size: 13px; z-index: 10; display: flex; gap: 16px; }
  .sv { color: #64ffda; font-weight: 600; }
</style>
</head>
<body>
<div id="wrap">
  <div id="files"><div class="ft">Files</div><div id="flist"></div></div>
  <div id="canvas-wrap"><canvas id="c"></canvas></div>
</div>
<div id="hud">
  <span>Agents: <span class="sv" id="ha">0</span></span>
  <span>Processing: <span class="sv" id="hp">0</span></span>
  <span>Queued: <span class="sv" id="hq">0</span></span>
  <span>Complete: <span class="sv" id="hc">0</span></span>
  <span>FPS: <span class="sv" id="hf">0</span></span>
</div>
<script>
(function(){
var C={active:"#64ffda",idle:"#3a506b",processing:"#ffb347",queued:"#4a4a6a",complete:"#45b764",pulse:"#64ffda",text:"#8892b0"};
function lerp(a,b,t){return a+(b-a)*t}
function hexRgba(h,a){var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return"rgba("+r+","+g+","+b+","+a+")"}
function sCol(s){switch(s){case"active":return C.active;case"processing":return C.processing;case"queued":return C.queued;case"complete":return C.complete;default:return C.idle}}
function fmtEta(s){if(s==null||s<=0)return"\u2014";if(s<60)return s+"s";var m=Math.floor(s/60),sec=s%60;return m+"m "+(sec>0?sec+"s":"")}

var canvas=document.getElementById("c"),ctx=canvas.getContext("2d"),W,H;
function resize(){W=canvas.width=window.innerWidth-220;H=canvas.height=window.innerHeight;var d=window.devicePixelRatio||1;canvas.width=W*d;canvas.height=H*d;canvas.style.width=W+"px";canvas.style.height=H+"px";ctx.scale(d,d)}
window.addEventListener("resize",resize);resize();

var sim={nodes:[],connections:[],pulses:[],simTime:0,lastTime:0,fps:0,fpsF:0,fpsT:0};
function mkN(id,x,y,type,label,state,r){return{id:id,x:x,y:y,tx:x,ty:y,type:type,label:label,state:state,r:r||(type==="agent"?14:7),br:r||(type==="agent"?14:7),phase:Math.random()*Math.PI*2,glow:state==="active"?1:0.2,flash:0}}
function mkC(a,b){return{from:a,to:b,activity:0}}
function mkP(c){return{conn:c,t:0,speed:0.35+Math.random()*0.3,alive:true,size:2.5+Math.random()*1.5,trail:[]}}
function bPt(ax,ay,bx,by,t,st){var mx=(ax+bx)/2,my=(ay+by)/2,dx=bx-ax,dy=by-ay,off=Math.sin(st*0.5+ax*0.01)*12,cx=mx+dy*off*0.01,cy=my-dx*off*0.01,u=1-t;return{x:u*u*ax+2*u*t*cx+t*t*bx,y:u*u*ay+2*u*t*cy+t*t*by}}

function layout(agents,files){
  var cx=W/2,cy=H/2,nodes=[],map={};
  var o=mkN("orchestrator",cx,cy,"agent","Orchestrator","active",18);nodes.push(o);map["orchestrator"]=o;
  var ao=agents.filter(function(a){return a.id!=="orchestrator"});
  var aR=Math.min(W,H)*0.2;
  ao.forEach(function(a,i){var ang=(i/ao.length)*Math.PI*2-Math.PI/2;var n=mkN(a.id,cx+Math.cos(ang)*aR,cy+Math.sin(ang)*aR,"agent",a.label,a.state,12);nodes.push(n);map[a.id]=n});
  var fR=Math.min(W,H)*0.36;
  files.forEach(function(f,i){var ang=(i/files.length)*Math.PI*2+Math.PI/8;var n=mkN(f.id,cx+Math.cos(ang)*fR+(Math.random()-0.5)*20,cy+Math.sin(ang)*fR+(Math.random()-0.5)*20,"file",f.label,f.state,6);nodes.push(n);map[f.id]=n});
  var conns=[];
  ao.forEach(function(a){if(map[a.id])conns.push(mkC(o,map[a.id]))});
  files.forEach(function(f){if(f.agent&&map[f.agent]&&map[f.id])conns.push(mkC(map[f.agent],map[f.id]))});
  return{nodes:nodes,connections:conns,map:map}
}

function applyState(data){
  var l=layout(data.agents||[],data.files||[]);
  sim.nodes=l.nodes;sim.connections=l.connections;sim.map=l.map;sim.pulses=[];
  (data.pulses||[]).forEach(function(p){
    var fn=sim.map[p.from],tn=sim.map[p.to];
    if(fn&&tn){var c=sim.connections.find(function(x){return x.from.id===p.from&&x.to.id===p.to});if(!c){c=mkC(fn,tn);sim.connections.push(c)}c.activity=1;sim.pulses.push(mkP(c))}
  });
  var s=data.stats||{};
  document.getElementById("ha").textContent=s.active_agents||0;
  document.getElementById("hp").textContent=s.files_processing||0;
  document.getElementById("hq").textContent=s.files_queued||0;
  document.getElementById("hc").textContent=s.files_complete||0;
  renderFileList(data.files||[]);
}

function renderFileList(files){
  var el=document.getElementById("flist");
  el.innerHTML="";
  files.forEach(function(f){
    var pct=Math.round((f.progress||0)*100);
    var d=document.createElement("div");d.className="fc"+(f.state?" "+f.state:"");
    d.innerHTML='<div class="fh"><span class="fn" title="'+f.label+'">'+f.label+'</span><span class="fs '+(f.state||"")+'">'+(f.state==="processing"?"ACTIVE":f.state==="complete"?"DONE":"WAIT")+'</span></div><div class="pt"><div class="pf '+(f.state||"")+'" style="width:'+pct+'%"></div></div><div class="ff"><span class="eta">'+(f.state==="processing"?"ETA "+fmtEta(f.eta_seconds):f.state==="complete"?"Complete":"Queued")+'</span><span class="pct">'+pct+'%</span></div>';
    el.appendChild(d);
  });
}

var API_TOKEN=(function(){var m=location.search.match(/token=([^&]+)/);return m?decodeURIComponent(m[1]):""})();
function fetchState(){
  fetch("/api/plugins/synapse/demo",{headers:{"X-Hermes-Session-Token":API_TOKEN}}).then(function(r){return r.json()}).then(applyState).catch(function(e){console.error(e)})
}
fetchState();setInterval(fetchState,3000);

function frame(){
  var now=performance.now()/1000,dt=Math.min(now-sim.lastTime,0.1);sim.lastTime=now;sim.simTime+=dt;
  sim.fpsF++;sim.fpsT+=dt;if(sim.fpsT>=0.5){sim.fps=Math.round(sim.fpsF/sim.fpsT);sim.fpsF=0;sim.fpsT=0}
  for(var i=0;i<sim.connections.length;i++){if(sim.connections[i].activity>0)sim.connections[i].activity=Math.max(0,sim.connections[i].activity-dt*0.5)}
  for(var j=sim.pulses.length-1;j>=0;j--){var p=sim.pulses[j];p.t+=p.speed*dt;if(p.t>=1){p.alive=false;p.conn.to.flash=sim.simTime}var pos=bPt(p.conn.from.x,p.conn.from.y,p.conn.to.x,p.conn.to.y,p.t,sim.simTime);p.trail.push({x:pos.x,y:pos.y,age:0});if(p.trail.length>10)p.trail.shift();for(var k=0;k<p.trail.length;k++)p.trail[k].age+=dt*4;if(!p.alive)sim.pulses.splice(j,1)}
  if(Math.random()<0.02){var ac=sim.connections.filter(function(c){return c.activity>0.3});if(ac.length)sim.pulses.push(mkP(ac[Math.floor(Math.random()*ac.length)]))}
  for(var n=0;n<sim.nodes.length;n++){var nd=sim.nodes[n];nd.x=lerp(nd.x,nd.tx,0.04);nd.y=lerp(nd.y,nd.ty,0.04);nd.r=nd.br*(1+Math.sin(sim.simTime*(nd.state==="active"?3:1.2)+nd.phase)*(nd.state==="active"?0.15:0.06));nd.glow=lerp(nd.glow,(nd.state==="active"||nd.state==="processing")?1:0.2,dt*3)}

  ctx.fillStyle="rgba(10,14,26,0.25)";ctx.fillRect(0,0,W,H);
  ctx.strokeStyle="rgba(100,255,218,0.015)";ctx.lineWidth=0.5;
  for(var gx=0;gx<W;gx+=50){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,H);ctx.stroke()}
  for(var gy=0;gy<H;gy+=50){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke()}

  sim.connections.forEach(function(c){var a=c.from,b=c.to,mx=(a.x+b.x)/2,my=(a.y+b.y)/2,dx=b.x-a.x,dy=b.y-a.y,off=Math.sin(sim.simTime*0.5+a.x*0.01)*12,cx=mx+dy*off*0.01,cy=my-dx*off*0.01;ctx.strokeStyle=c.activity>0.01?hexRgba(C.active,0.05+c.activity*0.3):"rgba(100,255,218,0.06)";ctx.lineWidth=1+c.activity*1.5;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.quadraticCurveTo(cx,cy,b.x,b.y);ctx.stroke()});
  sim.pulses.forEach(function(p){for(var i=0;i<p.trail.length;i++){var pt=p.trail[i],al=Math.max(0,1-pt.age)*0.5,sz=p.size*(1-pt.age*0.5);if(al<=0||sz<=0)continue;ctx.fillStyle=hexRgba(C.pulse,al);ctx.beginPath();ctx.arc(pt.x,pt.y,sz,0,Math.PI*2);ctx.fill()}var pos=bPt(p.conn.from.x,p.conn.from.y,p.conn.to.x,p.conn.to.y,p.t,sim.simTime);ctx.fillStyle="#fff";ctx.shadowColor=C.pulse;ctx.shadowBlur=10;ctx.beginPath();ctx.arc(pos.x,pos.y,p.size,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0});
  sim.nodes.forEach(function(nd){var col=sCol(nd.state),gr=nd.r*(3+nd.glow*4),gl=ctx.createRadialGradient(nd.x,nd.y,nd.r*0.5,nd.x,nd.y,gr);gl.addColorStop(0,hexRgba(col,0.3*nd.glow));gl.addColorStop(0.5,hexRgba(col,0.08*nd.glow));gl.addColorStop(1,hexRgba(col,0));ctx.fillStyle=gl;ctx.beginPath();ctx.arc(nd.x,nd.y,gr,0,Math.PI*2);ctx.fill();ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=12*nd.glow;ctx.beginPath();ctx.arc(nd.x,nd.y,nd.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;if(nd.flash>0){var age=sim.simTime-nd.flash;if(age<1){ctx.strokeStyle=hexRgba(C.complete,(1-age)*0.5);ctx.lineWidth=2;ctx.beginPath();ctx.arc(nd.x,nd.y,nd.r+age*25,0,Math.PI*2);ctx.stroke()}}ctx.fillStyle=hexRgba(C.text,0.6+nd.glow*0.4);ctx.font="11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";ctx.textAlign="center";ctx.fillText(nd.label,nd.x,nd.y+nd.r+15)});

  ctx.fillStyle="rgba(100,255,218,0.5)";ctx.font="11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";ctx.textAlign="right";ctx.fillText(sim.fps+" FPS",W-8,16);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
